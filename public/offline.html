<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#064e3b" />
  <title>Hope's Corner — Offline</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #ecfdf5; color: #064e3b; font: 16px system-ui, sans-serif; }
    main { max-width: 28rem; padding: 2rem; text-align: center; }
    button { border: 0; border-radius: .75rem; padding: .75rem 1rem; background: #047857; color: white; font: inherit; font-weight: 700; }

<body>
  <main>
    <h1>You're offline</h1>
    <p>Reconnect to the internet before viewing guest information or recording a check-in.</p>
    <button onclick="location.reload()">Try again</button>
  </main>

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/test.yml

  migrate:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2

      - name: Detect migration changes
        id: migrations
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^supabase/migrations/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.migrations.outputs.changed == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        if: steps.migrations.outputs.changed == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          supabase db push

  deploy:
    runs-on: ubuntu-latest
    needs: [ci, migrate]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup-node

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  tag-release:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node
        with:
          install-dependencies: "false"

      - name: Create release tag if missing
        id: tag
        run: |
          tag="$(node scripts/releaseVersion.mjs tag)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Release tag ${tag} already exists; skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

      - name: Create GitHub release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "GitHub release ${tag} already exists; skipping"
            exit 0
          fi
          version="${tag#v}"
          notes="$(awk -v ver="${version}" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)"
          if [ -n "$(printf '%s' "${notes}" | tr -d '[:space:]')" ]; then
            gh release create "${tag}" --title "${tag}" --notes "${notes}"
          else
            gh release create "${tag}" --title "${tag}" --generate-notes
          fi

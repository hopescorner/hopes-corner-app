name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  test-and-lint:
    uses: ./.github/workflows/test.yml

  migrate:
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2

      - name: Detect migration changes
        id: migrations
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^supabase/migrations/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Supabase CLI
        if: steps.migrations.outputs.changed == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        if: steps.migrations.outputs.changed == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          supabase db push

  deploy:
    runs-on: ubuntu-latest
    needs: [test-and-lint, migrate]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup-node

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42.3.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

  tag-release:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node
        with:
          install-dependencies: "false"

      - name: Create release tag if missing
        run: |
          tag="$(node scripts/releaseVersion.mjs tag)"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Release tag ${tag} already exists; skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

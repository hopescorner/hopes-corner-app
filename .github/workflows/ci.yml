name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Verify release versions stay in sync
        run: npm run version:check

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright Component Tests
        run: npm run test:ct

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-ct-report
          path: playwright-report/
          retention-days: 30

  migrate:
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to detect changes

      - name: Check for migration changes
        id: migration-check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^supabase/migrations/"; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Supabase CLI
        if: steps.migration-check.outputs.has_changes == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: steps.migration-check.outputs.has_changes == 'true'
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run database migrations
        if: steps.migration-check.outputs.has_changes == 'true'
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Skip migrations (no changes)
        if: steps.migration-check.outputs.has_changes == 'false'
        run: echo "No database changes detected, skipping migrations"

  deploy:
    runs-on: ubuntu-latest
    needs: [test-and-lint, migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # https://github.com/amondnet/vercel-action
      # https://vercel.com/kb/guide/how-can-i-use-github-actions-with-vercel
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

  tag-release:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine release tag
        id: release-tag
        run: echo "tag=$(node scripts/releaseVersion.mjs tag)" >> "$GITHUB_OUTPUT"

      - name: Check whether the release tag already exists
        id: tag-check
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.release-tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create annotated release tag
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.release-tag.outputs.tag }}" -m "Release ${{ steps.release-tag.outputs.tag }}"
          git push origin "${{ steps.release-tag.outputs.tag }}"

      - name: Skip existing release tag
        if: steps.tag-check.outputs.exists == 'true'
        run: echo "Release tag ${{ steps.release-tag.outputs.tag }} already exists; skipping"

